<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー追加</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="signup.js"></script>
</head>
<body>
    <header id="header">
      <h1 class="noto-sans-jp-bold">ユーザー追加</h1>
    </header>
    <div class="user-add-container">
      <form class="user-add-form" id="user-add-form">
        <label for="type" class="label">種類</label>
        <select class="input-box" id="type" name="type" required>
          <option value="customer">お店</option>
          <option value="seller">販売者</option>
        </select>

        <label for="username" class="label">名前</label>
        <input type="text" class="input-box" id="username" name="username" required>
      
        <button type="submit" class="noto-sans-jp-bold button">追加</button>
      </form>
    </div>
    </body>
</html>
