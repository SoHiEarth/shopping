<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リンクをコピー</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="copylink.js"></script>
  </head>
  <body>
    <header id="header">
      <h1 class="noto-sans-jp-bold">リンクをコピー</h1>
    </header>
    <div class="copy-link-container">
      <p>以下のリンクをコピーして、ユーザーに共有してください。</p>
      <input type="text" class="input-box" id="copy-link-input" readonly>
      <button class="button" id="copy-link-button">コピーする</button>
    </div>  
  </body>
</html>
