<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品を編集</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
  </head>
  <body>
    <header id="header">
      <h1 class="noto-sans-jp-bold">商品を編集</h1>
      <h1 class="noto-sans-jp-bold" id="product-name-display">商品名</h1>
    </header>
    <div class="container">
      <div id="warning-container">
        <div id="warning">
          <h2 id="warning-title" class="noto-sans-jp-bold">商品の価格が未設定です。</h2>
          <p>早急に設定してください。</p>
        </div>
      </div>
      <div class="edit-container">
        <form id="edit-form" class="edit-form">
          <label for="product-name" class="label">商品名</label>
          <input type="text" id="product-name" class="input-box" name="name" required>
          <label for="product-price" class="label">価格</label>
          <input type="number" id="product-price" class="input-box" name="price" step="0.01">
          <label for="product-stock" class="label">在庫数</label>
          <input type="number" id="product-stock" class="input-box" name="stock" min="0">
          <button type="submit" class="noto-sans-jp-bold button">更新</button>
        </form>
      </div>
    </div>
  </body>
</html>
