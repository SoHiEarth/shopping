<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理画面</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
      <h1 class="noto-sans-jp-bold">管理画面</h1>
      <div class="admin-tools">
        <button class="admin-button" onclick="location.href='add-user/index.html'">ユーザー管理</button>
        <button class="admin-button">注文管理</button>
      </div>
    </header>
    <div class="admin-container">
      <section class="warning">
        <h2 class="noto-sans-jp-bold warning-title">警告</h2>
        <p>以下の商品の価格が未設定です。</p>
        <ul>
            <li>商品B</li>
            <li>商品C</li>
        </ul>
        <p>公開はされていません。早急に設定してください。</p>
      </section>
      <section class="table-container">
        <h2 class="noto-sans-jp-bold">商品一覧</h2>
        <table class="product-table">
          <thead>
            <tr>
              <th>商品名</th>
              <th>価格</th>
              <th>注文数</th>
              <th>在庫数</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>商品A</td>
              <td>1000円</td>
              <td>5</td>
              <td>20</td>
            </tr>

            <tr>
              <td>商品B</td>
              <td class="alert">未設定</td>
              <td>3</td>
              <td>15</td>
            </tr>

            <tr>
              <td>商品C</td>
              <td class="alert">未設定</td>
              <td>8</td>
              <td>10</td>
            </tr>
          </tbody>
        </table>
      </section>
    </div>
    </body>
</html>
