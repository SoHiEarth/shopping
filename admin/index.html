<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一覧</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <h1 class="noto-sans-jp-bold">管理画面</h1>
    </header>
    <div class="admin-tools">
        <button class="admin-button">ユーザー管理</button>
        <button class="admin-button">商品管理</button>
        <button class="admin-button">注文管理</button>
    </div>
    </div>
    <section class="table-container">
      <h2 class="noto-sans-jp-bold">商品一覧</h2>
      <table class="product-table">
        <thead>
          <tr>
            <th>商品名</th>
            <th>価格</th>
            <th>注文数</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>商品A</td>
            <td>1000円</td>
            <td>5</td>
          </tr>

          <tr>
            <td>商品B</td>
            <td>2000円</td>
            <td>3</td>
          </tr>

          <tr>
            <td>商品C</td>
            <td>1500円</td>
            <td>8</td>
          </tr>
        </tbody>
      </table>
    </section>
    </body>
</html>
