<!DOCTYPE html>
<html lang="jp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <img src="background.png" alt="背景画像" class="background-image">
  <form class="login-form">
    <h1 class="noto-sans-jp-bold">ログイン</h1>
    <label for="username" class="noto-sans-jp-regular">ユーザー名</label>
    <input type="text" id="username" name="username" required>
    <label for="password" class="noto-sans-jp-regular">パスワード</label>
    <input type="password" id="password" name="password" required>
    <button type="submit" class="noto-sans-jp-bold">ログイン</button>
  </form>
</body>
</html>
