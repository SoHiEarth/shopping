<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品追加</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <header id="header">
      <h1 class="noto-sans-jp-bold">商品追加</h1>
      <h1 id="username" class="noto-sans-jp-bold"></h1>
    </header>
    <div class="add-item-container">
        <form id="add-item-form" class="add-item-form">
            <label for="item-name" class="label">商品名</label>
            <input type="text" id="item-name" class="input-box" name="item-name" required>
            <label for="item-stock" class="label">在庫数</label>
            <input type="number" id="item-stock" class="input-box" name="stock" required>
            <label for="item-description" class="label">一言</label>
            <textarea type="text" id="item-description" class="input-box" name="info" class="auto-grow" rows="4" cols="50" required></textarea>
            <button type="submit" class="button">追加</button>
        </form>
    </div>
</body>
</html>
