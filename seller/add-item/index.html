<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品追加</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
      <h1 class="noto-sans-jp-bold">商品追加</h1>
      <h1 class="noto-sans-jp-bold">ABC農業</h1>
    </header>
    <div class="add-item-container">
        <form class="add-item-form">
            <label for="product-name">商品名</label>
            <input type="text" id="product-name" name="product-name" required>
            <label for="stock">在庫数</label>
            <input type="number" id="stock" name="stock" required>
            <label for="info">一言</label>
            <textarea type="text" id="info" name="info" class="auto-grow" rows="4" cols="50" required></textarea>
            <button type="submit" class="add-item-button">追加</button>
        </form>
    </div>
</body>
</html>
