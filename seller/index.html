<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');
    </style>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <header id="header">
        <h1 class="noto-sans-jp-bold">商品管理</h1>
        <h1 class="noto-sans-jp-bold" id="username">ABC農業</h1>
    </header>
    <section class="table-container">
      <div class="tools">
        <h2 class="noto-sans-jp-bold">商品一覧</h2>
        <button id="add-product" class="button" onclick="location.href='add-item/index.html'">商品追加</button>
      </div>
      <table class="product-table">
        <thead>
          <tr>
            <th>商品名</th>
            <th>注文数</th>
            <th>在庫数</th>
          </tr>
        </thead>
        <tbody id="product-table-body"></tbody>
      </table>
    </div>
</body>
</html>
