<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap");
    </style>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="script.js"></script>
</head>
<body>
    <header id="header">
        <h1 class="noto-sans-jp-bold">商品管理</h1>
        <h1 class="noto-sans-jp-bold" id="username">ABC農業</h1>
    </header>
    <section class="table-container">
      <div class="tools">
        <h2 class="noto-sans-jp-bold">商品一覧</h2>
        <button id="add-product" class="button">商品追加</button>
      </div>
      <table class="product-table">
        <thead>
          <tr>
            <th>商品名</th>
            <th>注文数</th>
            <th>在庫数</th>
          </tr>
        </thead>
        <tbody id="product-table-body"></tbody>
      </table>
    </div>
    <div id="product-details-modal">
      <div class="modal-content">
        <span id="close-button">&times;</span>
        <form id="product-details-form">
          <label for="product-name" class="label">商品名</label>
          <input type="text" id="product-name" class="input-box">
          <label for="order-count" class="label">注文数</label>
          <input type="number" id="order-count" class="input-box" min="0">
          <label for="stock-input" class="label">在庫数</label>
          <input type="number" id="stock-input" class="input-box" min="0">
          <label for="description-input" class="label">一言</label>
          <textarea id="description-input" class="input-box" rows="4"></textarea>
        </form>
        <button type="submit" id="submit-button" class="button">更新する</button>
      </div>
    </div>
</body>
</html>
